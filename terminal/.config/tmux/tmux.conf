set -sg escape-time 0

# From Tmux Sensible (becuase overriding 'escape-time'
# was proving to be annoying with WSL):
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g default-terminal "screen-256color"
set -g status-keys emacs
set -g focus-events on
setw -g aggressive-resize on

# Status bar stuff (from @mischavandenburg's config)
set -g status-right "#(pomo)"
set -g status-style "fg=#665c54"
set -g status-left-style "fg=#928374"
set -g status-bg default
set -g status-position top
set -g status-interval 1
set -g status-left ""

# Pane borders
set -g pane-border-style 'fg=colour1'
set -g pane-active-border-style 'fg=colour3'

# Ctrl+a as the leader key (I bind CapsLock to Ctrl!)
unbind C-b
set -g prefix 'C-a'
bind 'C-a' send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Bar Position (top)
set-option -g status-position top

# I'm so sorry, everyone
setw -g mouse on

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key "h" if-shell "$is_vim" "send-keys C-a h" "select-pane -L"
bind-key "j" if-shell "$is_vim" "send-keys C-a j" "select-pane -D"
bind-key "k" if-shell "$is_vim" "send-keys C-a k" "select-pane -U"
bind-key "l" if-shell "$is_vim" "send-keys C-a l" "select-pane -R"

# Kill panes/windows with q/Q
bind q kill-pane
bind Q kill-window

# Split with s (horizontal) and d (vertical)
bind s split-pane -l 45 -h
bind d split-pane -l 45

# Add/Remove Status Bar
bind t set-option status

# We rebound 's', so...
bind T choose-session
